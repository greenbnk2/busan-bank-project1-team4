logging:
  file:
    name: logs/Busanbank.log
  level:
    root: info
mybatis:
  mapper-locations: classpath:mappers/**/*.xml
server:
  port: 8080
  servlet:
    context-path: /busanbank
  tomcat:
    uri-encoding: UTF-8
spring:
  application:
    name: Busanbank
    version: 0.0.4-SNAPSHOT
  datasource:
    driver-class-name: oracle.jdbc.driver.OracleDriver
    url: jdbc:oracle:thin:@34.158.204.102:1521/XEPDB1
    username: bnkproject
    password: abc1234
    hikari:
      maximumPoolSize: 10
      minimumIdle: 3
      idleTimeout: 180000        # 3분
      maxLifetime: 300000        # 5분
      connectionTimeout: 30000   # 30초
      validationTimeout: 5000    # 5초
  devtools:
    livereload:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: yd89023754@gmail.com
    password: jifeinzsrqaqrrwl
    properties:
      mail:
        smtp:
          auth: true
          timeout: 5000
          starttls:
            required: true
            enable: true
          ssl:
            trust: smtp.gmail.com
  solapi:
    api:
      key: ${SOLAPI_KEY:default_value}
      secret: ${SOLAPI_SECRET:default_value}
      from: ${SOLAPI_FROM:default_value}

  youtube:
    api:
      api-key: ${YOUTUBE_API_KEY}
      playlist-id: "PLZGDyqLjHoLQpBJ59m1lRHGP__TCvSDF2"

  security:
    user:
      name: user
      password: 1234
      roles: ADMIN
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            scope: name,email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Naver
            authorization-grant-type: authorization_code
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-name: Kakao
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope: profile_nickname
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

file:
  upload:
    path: /var/lib/busanbank/uploads/